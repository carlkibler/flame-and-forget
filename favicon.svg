<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="flameGrad" cx="50%" cy="70%">
      <stop offset="0%" stop-color="#fffacd" stop-opacity="0.95"/>
      <stop offset="40%" stop-color="#ff8c42" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ef4444" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="32" height="32" fill="#0b0e13" rx="4"/>

  <!-- Flame -->
  <ellipse cx="16" cy="22" rx="8" ry="12" fill="url(#flameGrad)"/>
  <ellipse cx="16" cy="20" rx="6" ry="10" fill="url(#flameGrad)" opacity="0.8"/>
  <ellipse cx="16" cy="18" rx="4" ry="7" fill="#ffd166" opacity="0.9"/>

  <!-- Bright core -->
  <ellipse cx="16" cy="20" rx="2.5" ry="4" fill="#fffacd" opacity="0.95"/>
</svg>
